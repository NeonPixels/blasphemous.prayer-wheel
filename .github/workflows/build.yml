name: Build

on:
  push:
    tags: [ "**" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build Project
      run: |
        dotnet restore
        dotnet build --configuration Release --no-restore

    - name: Export Settings
      run: |
        MOD_TITLE=$(grep -oP '<Title>\K[^<]+' PrayerWheel/PrayerWheel.csproj)
        echo "MOD_TITLE=$MOD_TITLE" >> $GITHUB_ENV
        MOD_NAME=$(grep -oP '<TargetName>\K[^<]+' PrayerWheel/PrayerWheel.csproj)
        echo "MOD_NAME=$MOD_NAME" >> $GITHUB_ENV
        MOD_VERSION=$(grep -oP '<Version>\K[^<]+' PrayerWheel/PrayerWheel.csproj)
        echo "MOD_VERSION=$MOD_VERSION" >> $GITHUB_ENV

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: ${{ env.MOD_TITLE }} v${{ github.ref_name }}

    - name: Upload Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: publish/${{ env.MOD_NAME }}.zip
        asset_name: ${{ env.MOD_NAME }}.zip
        asset_content_type: application/zip